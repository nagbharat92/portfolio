<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <title>Bharat Nag</title>
    <!-- Browser UI / toolbar tint (Dia, Safari, Chrome). Kept in sync with the
         page background (--background): #f2f2f2 light, #0a0a0a dark. -->
    <meta name="theme-color" content="#0a0a0a" />
    <script>
      // Sync .dark class + theme-color with system preference before first paint
      (function () {
        var mq = window.matchMedia('(prefers-color-scheme: dark)');
        function apply(e) {
          var isDark = e.matches;
          document.documentElement.classList.toggle('dark', isDark);
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', isDark ? '#0a0a0a' : '#f2f2f2');
        }
        apply(mq);
        mq.addEventListener('change', apply);
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!-- Fallback content shown before React mounts -->
    <div id="loading" style="display:none; text-align:center; padding:4rem; font-family:system-ui,sans-serif; color:#888;">
      <p>Loading...</p>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
