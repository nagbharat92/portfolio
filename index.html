<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <title>Bharat Nag</title>
    <!-- Fonts: Chango (display / headings) + Cause (body). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cause:wght@400;500;600;700&family=Chango&display=swap"
      rel="stylesheet"
    />
    <!-- Browser UI / toolbar tint (Dia, Safari, Chrome). Kept in sync with the
         page background (--bg): #FBFBF8 light, #16171D dark. -->
    <meta name="theme-color" content="#FBFBF8" />
    <script>
      // Seed the manual data-theme attribute + theme-color once, before first
      // paint, from the OS preference. After mount the app owns it (manual
      // toggle drives [data-theme] — see src/App.tsx and src/tokens.css).
      (function () {
        var isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', isDark ? '#16171D' : '#FBFBF8');
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!-- Fallback content shown before React mounts -->
    <div id="loading" style="display:none; text-align:center; padding:4rem; font-family:system-ui,sans-serif; color:#7A7666;">
      <p>Loading...</p>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
